name: Publish docs

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync --only-group docs --frozen
    
    - name: Build
      run: uv run --no-sync zensical build --clean

    - name: Upload
      uses: actions/upload-pages-artifact@v4
      with:
        path: site

    - name: Deploy
      id: deploy
      uses: actions/deploy-pages@v4
